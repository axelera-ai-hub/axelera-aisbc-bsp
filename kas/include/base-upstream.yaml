repos:
  bitbake:
    url: "https://git.openembedded.org/bitbake"
    branch: master
    commit: 7fd4d9d10524ac798ba96057462ea77e6998b0ff
    signed: false
    layers:
      .: disabled

  openembedded-core:
    url: "https://git.openembedded.org/openembedded-core"
    branch: master
    commit: e954a94b5b528b2430e8da331107d7d58287f89b
    signed: false
    layers:
      meta:

  meta-openembedded:
    url: "https://git.openembedded.org/meta-openembedded"
    branch: master
    commit: d1f51bbd0adf81a65e041ec2afbf8d266eabdf54
    signed: false
    layers:
      meta-filesystems:
      meta-gnome:
      meta-oe:
      meta-perl:
      meta-python:
      meta-networking:
      meta-multimedia:
      meta-xfce:

  meta-arm:
    url: "git://git.yoctoproject.org/meta-arm"
    branch: master
    commit: efbc6b618e3e6ed9b7ab332deffcec95da5f3d31
    signed: false
    layers:
      meta-arm-toolchain:
      meta-arm:

  meta-virtualization:
    url: "https://git.yoctoproject.org/meta-virtualization"
    branch: master
    commit: f829fbfda0f14365235d48dbe2055121fbc0718c
    signed: false

  meta-rockchip:
    url: "git://git.yoctoproject.org/meta-rockchip"
    branch: master
    commit: d274f5d4653f6a36ccdc094b97770afc800541ab
    signed: false

  meta-axelera:
    layers:
      meta-axelera:
      meta-axelera/meta-voyager:

local_conf_header:
  meta-axelera: |
    # Some useful lines you may want to copy to your site.conf for development
    # INHERIT += "rm_work"
    EXTRA_IMAGE_FEATURES += "empty-root-password \
                             allow-empty-password \
                             allow-root-login \
                             "
    # LICENSE_FLAGS_ACCEPTED += "NXP_EULA_v57 NXP_EULA_v58"
    BBMASK += "meta-axelera/recipes-mender/mender-axelera-state-scripts/"
    BBMASK += "meta-axelera/recipes-bsp/rockchip-npu-firefly/"
    BBMASK += "meta-axelera/recipes-kernel/linux/linux-rockchip.*"
    BBMASK += "meta-axelera/recipes-apps/xfce4-terminal/"
    BBMASK += "meta-axelera/recipes-bsp/rk-binary/"
    BBMASK += "meta-axelera/recipes-bsp/u-boot/u-boot-rockchip.bbappend"
    BBMASK += "meta-axelera/recipes-containers/docker/"
    BBMASK += "meta-axelera/recipes-devtools/android-tools/"
    BBMASK += "meta-axelera/recipes-graphics/rockchip-libmali/"
    BBMASK += "meta-axelera/recipes-graphics/rockchip-librga/"
    BBMASK += "meta-axelera/recipes-mender/mender-client/"
    BBMASK += "meta-axelera/recipes-multimedia/gstreamer-rockchip/"
    BBMASK += "meta-axelera/recipes-multimedia/rockchip-mpp/"
    BBMASK += "meta-axelera/recipes-support/libzip/"
    BBMASK += "meta-axelera/recipes-support/opencv/"
    BBMASK += "meta-axelera/meta-voyager/recipes-core/images/voyager-image-weston.bb"
