local_conf_header:
  meta-axelera: |
    # Some useful lines you may want to copy to your site.conf for development
    # INHERIT += "rm_work"
    EXTRA_IMAGE_FEATURES += "empty-root-password \
                             allow-empty-password \
                             allow-root-login \
                             "
    # LICENSE_FLAGS_ACCEPTED += "NXP_EULA_v57 NXP_EULA_v58"
    BBMASK += "meta-axelera/recipes-mender/mender-axelera-state-scripts/"
    BBMASK += "meta-axelera/recipes-bsp/rockchip-npu-firefly/"
    BBMASK += "meta-axelera/recipes-kernel/linux/linux-rockchip.*"
    BBMASK += "meta-axelera/recipes-apps/xfce4-terminal/"
    BBMASK += "meta-axelera/recipes-bsp/rk-binary/"
    BBMASK += "meta-axelera/recipes-bsp/u-boot/u-boot-rockchip.bbappend"
    BBMASK += "meta-axelera/recipes-containers/docker/"
    BBMASK += "meta-axelera/recipes-devtools/android-tools/"
    BBMASK += "meta-axelera/recipes-graphics/rockchip-libmali/"
    BBMASK += "meta-axelera/recipes-graphics/rockchip-librga/"
    BBMASK += "meta-axelera/recipes-mender/mender-client/"
    BBMASK += "meta-axelera/recipes-multimedia/gstreamer-rockchip/"
    BBMASK += "meta-axelera/recipes-multimedia/rockchip-mpp/"
    BBMASK += "meta-axelera/recipes-support/libzip/"
    BBMASK += "meta-axelera/recipes-support/opencv/"
    BBMASK += "meta-axelera/meta-voyager/recipes-core/images/voyager-image-weston.bb"
