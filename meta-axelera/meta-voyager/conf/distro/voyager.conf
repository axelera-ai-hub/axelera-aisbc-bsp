# This is an example distro conf. Here is where you can customize the
# policies about how your embedded Linux system should be
# configured. Writing one is so simple that it does not make sense to not
# do it.

DISTRO_NAME = "Voyager Linux"
DISTRO_VERSION = "1.3.3"
SDK_NAME_PREFIX = "voyager"
SDK_VENDOR = "-voyager"
SDK_VERSION := "${@'${DISTRO_VERSION}'.replace('snapshot-${METADATA_REVISION}','snapshot')}"
SDK_VERSION[vardepvalue] = "${SDK_VERSION}"
MAINTAINER = "Amarula Solutions <info@amarulasolutions.com>"
TARGET_VENDOR = "-voyager"

LLVMVERSION = "21.1.8"

# Set features we want on all AXELERA devices. Also disables any features not
# explicitly mentioned.
DISTRO_FEATURES = " \
  egl \
  ipv4 \
  ipv6 \
  egl \
  opencl \
  opengl \
  overlayfs \
  pam \
  seccomp \
  security \
  systemd \
  usbgadget \
  vulkan \
  usbhost \
  virtualization \
  wayland \
  wifi \
  x11 \
  zeroconf \
"

LICENSE_FLAGS_ACCEPTED:append = " commercial"
RUSTVERSION = "1.82.0"
RUST_VERSION = "1.82.0"

require conf/distro/include/mender-config.inc
require conf/distro/include/cve-extra-exclusions.inc
require conf/distro/include/rust_versions.inc

PREFERRED_PROVIDER_virtual/egl = "mesa"
PREFERRED_PROVIDER_virtual/libgl = "mesa"
PREFERRED_PROVIDER_virtual/libgles1 = "mesa"
PREFERRED_PROVIDER_virtual/libgles2 = "mesa"
PREFERRED_PROVIDER_virtual/libgbm = "mesa"
PREFERRED_PROVIDER_virtual/mesa = "mesa"

GALLIUMDRIVERS:append:pn-mesa = ",panfrost"
PACKAGECONFIG:append:pn-mesa = " egl gles gbm opengl opencl panfrost libclc vulkan"
