DISTRO_NAME = "Voyager Linux Minimal"
DISTRO_VERSION = "0.0.1"
SDK_NAME_PREFIX = "voyager-minimal"
SDK_VENDOR = "-voyagerminimalsdk"
SDK_VERSION := "${@'${DISTRO_VERSION}'.replace('snapshot-${METADATA_REVISION}','snapshot')}"
SDK_VERSION[vardepvalue] = "${SDK_VERSION}"
MAINTAINER = "Amarula Solutions <info@amarulasolutions.com>"
TARGET_VENDOR = "-voyagerminimal"

# Set features we want on all AXELERA devices. Also disables any features not
# explicitly mentioned.
DISTRO_FEATURES = " \
  egl \
  ipv4 \
  ipv6 \
  opengl \
  pam \
  seccomp \
  systemd \
  usbgadget \
  usbhost \
  wayland \
  wifi \
  x11 \
  zeroconf \
"

LICENSE_FLAGS_ACCEPTED:append = " commercial"

DISTRO_FEATURES_OPTED_OUT += "sysvinit"
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"

PREFERRED_PROVIDER_virtual/egl = "mesa"
PREFERRED_PROVIDER_virtual/libgl = "mesa"
PREFERRED_PROVIDER_virtual/libgles1 = "mesa"
PREFERRED_PROVIDER_virtual/libgles2 = "mesa"
PREFERRED_PROVIDER_virtual/libgbm = "mesa"

GALLIUMDRIVERS:append:pn-mesa = ",panfrost"
PACKAGECONFIG:append:pn-mesa = " egl gles gbm opengl"
